# Built with Jekyll 3.2.0

# Setup
title:               Down the Rabbit Holes!
tagline:             'writings mostly about my scientific work and some other things'
description:          
    This is the personal website of Sandesh Kalantre. I am a graduate student at the Joint Quantum Institute (JQI), University of Maryland - College Park. Physics, especially all things quantum, is my forte. I also like classical music and travelling around.
url:                 'https://sandeshkalantre.github.io'
baseurl:             ''

# About/contact
author:
  name:              Sandesh Kalantre
  url:               https://twitter.com/sandeshkalantre
  email:             kalantresandesh@gmail.com

# Permalinks

# Color scheme. Options: red, orange, magenta, cyan, blue, brown
color-scheme: 

permalink: pretty
permalink: /:title/

# Set encoding to UTF-8
encoding: utf-8

# Collections for texts
collections:
  texts:
    output: true

# Markdown specs
markdown: kramdown

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  footnote_backlink: "&#x21a9;&#xfe0e;"
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Exclusions from the final site
exclude:
  - optional
  - vendor

# Theme
theme: "ed."


